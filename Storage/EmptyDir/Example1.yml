apiVersion: v1
kind: Pod
metadata:
  name: emptydir
  labels:
    env: prod
spec:
  volumes:
  - name: emptydir-volume
    emptyDir: {}

  containers:
  - name: nginx
    image: nginx
    volumeMounts:
      - mountPath: "/flm"
        name: emptydir-volume
  
  - name: httpd
    image: httpd
    volumeMounts:
    - mountPath: "/devops"
      name: emptydir-volume

