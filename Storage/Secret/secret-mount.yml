apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-deployment
spec:
  selector:
    matchLabels:
      app: secret-deployment
  template:
    metadata:
      labels:
        app: secret-deployment
    spec:
      containers:
      - name: secret-deployment
        image: nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - name: volume-secret
          mountPath: /yuvi
      volumes:
      - name: volume-secret
        secret:
         secretName: mysecret
